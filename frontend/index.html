<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionary AI - Eye Disease Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-12 px-4">
    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-8">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-800">👁️ Visionary AI</h1>
            <p class="text-slate-500 mt-2">AI-Powered Eye Disease Detection System</p>
        </header>

        <div class="space-y-6">
            <div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:border-blue-500 transition-colors cursor-pointer" id="dropzone">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <div id="previewContainer" class="hidden mb-4 flex justify-center">
                    <img id="imagePreview" class="max-h-64 rounded-lg shadow-md">
                </div>
                <p class="text-slate-600" id="statusText">Drag & drop or <span class="text-blue-600 font-semibold">click to upload</span> fundus image</p>
            </div>

            <button onclick="uploadImage()" id="predictBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all disabled:bg-slate-400" disabled>
                Analyze Image
            </button>

            <div id="result" class="hidden mt-8 p-6 bg-blue-50 rounded-xl border border-blue-100">
                <h3 class="text-lg font-bold text-blue-900 mb-2">Diagnosis Result:</h3>
                <div class="flex justify-between items-center">
                    <span id="predictionText" class="text-2xl font-black text-slate-800 uppercase tracking-tight"></span>
                    <span id="confidenceText" class="bg-blue-600 text-white px-3 py-1 rounded-full text-sm font-bold"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const predictBtn = document.getElementById('predictBtn');
        const resultDiv = document.getElementById('result');

        dropzone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('imagePreview').src = event.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    document.getElementById('statusText').innerText = file.name;
                    predictBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        };

        async function uploadImage() {
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append("file", file);

            predictBtn.innerText = "Processing...";
            predictBtn.disabled = true;

            try {
                const response = await fetch("http://127.0.0.1:8000/predict", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                document.getElementById('predictionText').innerText = data.prediction;
                document.getElementById('confidenceText').innerText = data.confidence;
                resultDiv.classList.remove('hidden');
            } catch (error) {
                alert("Make sure your Backend (main.py) is running!");
            } finally {
                predictBtn.innerText = "Analyze Image";
                predictBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
